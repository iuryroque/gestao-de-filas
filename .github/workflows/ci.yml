name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gestao_filas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U postgres && break || true
            echo "waiting for postgres..."
            sleep 1
          done
        env:
          PGPASSWORD: postgres

      - name: Run migrations (node-pg-migrate)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/gestao_filas
        run: |
          npm run migrate:up

      - name: Run tests (Postgres)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/gestao_filas
          DB_CLIENT: pg
        run: npm test
