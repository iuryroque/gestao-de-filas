<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Guichê - Interface (Prototype)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Guichê 3 — Protótipo</div>
    <div class="status">Status: <span id="status">Pronto</span></div>
  </header>

  <main class="center">
    <section class="card current">
      <h2>Ticket Atual</h2>
      <div class="ticketLarge">
        <div class="code" id="code">—</div>
        <div class="meta">Serviço: <span id="svc">—</span></div>
        <div class="meta">Prioridade: <span id="prio">Normal</span></div>
        <div class="meta">Tempo na fila: <span id="time">—</span></div>
      </div>
    </section>

    <aside class="actions card">
      <button id="callBtn" class="primary large">Chamar Próximo (F2)</button>
      <button id="recallBtn" class="small">Reconvocar</button>
      <button id="finalizeBtn" class="primary">Finalizar Atendimento (F3)</button>
      <button id="noshowBtn" class="danger">Não Compareceu</button>
      <button id="transferBtn" class="small">Transferir</button>
    </aside>

    <section class="card sidebar" id="sidebar">
      <h3>Visão da Fila</h3>
      <div>Totais: <span id="total">0</span></div>
      <div>Prioritários: <span id="prioCount">0</span></div>
      <div>Estimativa: <span id="est">~N/A</span></div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://localhost:3000';
    const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.hostname + ':3000';
    let ws;

    function initWS(){
      try{
        ws = new WebSocket(WS_URL);
        ws.onopen = ()=>console.log('WS connected');
        ws.onmessage = ev => {
          // refresh queue stats on any event
          fetchStats();
        };
        ws.onclose = ()=>console.log('WS closed');
      }catch(e){console.warn('WS init failed', e)}
    }
    initWS();

    const callBtn = document.getElementById('callBtn');
    const finalizeBtn = document.getElementById('finalizeBtn');
    const recallBtn = document.getElementById('recallBtn');
    const noshowBtn = document.getElementById('noshowBtn');
    const transferBtn = document.getElementById('transferBtn');
    const codeEl = document.getElementById('code');
    const svcEl = document.getElementById('svc');
    const prioEl = document.getElementById('prio');
    const timeEl = document.getElementById('time');
    const totalEl = document.getElementById('total');
    const prioCountEl = document.getElementById('prioCount');
    const estEl = document.getElementById('est');
    let currentTicket = null;

    async function fetchStats(){
      try{
        const r = await fetch(`${API_BASE}/queues/default/stats`);
        if(!r.ok) return;
        const s = await r.json();
        totalEl.textContent = s.waiting || 0;
        estEl.textContent = s.tme_seconds? '~' + Math.round(s.tme_seconds/60) + ' min' : '~N/A';
      }catch(e){console.warn(e)}
    }

    callBtn.onclick = async () => {
      try{
        // fetch waiting tickets
        const listResp = await fetch(`${API_BASE}/tickets?queueId=default&status=waiting`);
        if(!listResp.ok) throw new Error('Falha ao buscar fila');
        const list = await listResp.json();
        if(!list.length){ alert('Nenhum ticket aguardando'); return; }
        const next = list[0];
        const callResp = await fetch(`${API_BASE}/tickets/${next.id}/call`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ guiche: '3' }) });
        if(!callResp.ok) throw new Error('Falha ao chamar ticket');
        const t = await callResp.json();
        currentTicket = t;
        codeEl.textContent = t.number || t.id;
        svcEl.textContent = t.meta && t.meta.service ? t.meta.service : '—';
        prioEl.textContent = 'Normal';
        timeEl.textContent = '—';
        document.getElementById('status').textContent = 'Em Atendimento';
        fetchStats();
      }catch(e){ alert('Erro: ' + e.message); }
    }

    finalizeBtn.onclick = async () => {
      if(!currentTicket){ alert('Nenhum ticket em atendimento'); return; }
      try{
        const r = await fetch(`${API_BASE}/tickets/${currentTicket.id}/finalize`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ result: { outcome: 'ok' } }) });
        if(!r.ok) throw new Error('Falha ao finalizar');
        alert('Atendimento finalizado: ' + currentTicket.id);
        currentTicket = null;
        codeEl.textContent = '—'; svcEl.textContent='—'; prioEl.textContent='Normal'; timeEl.textContent='—';
        document.getElementById('status').textContent = 'Pronto';
        fetchStats();
      }catch(e){ alert('Erro: ' + e.message); }
    }

    recallBtn.onclick = () => { if(!currentTicket){ alert('Nenhum ticket para reconvocar'); return; } alert('Reconvocando: ' + currentTicket.id); }
    noshowBtn.onclick = () => { if(!currentTicket){ alert('Nenhum ticket ativo'); return; } alert('Registrado não comparecimento para ' + currentTicket.id); currentTicket = null; document.getElementById('status').textContent = 'Pronto'; }
    transferBtn.onclick = () => { if(!currentTicket){ alert('Nenhum ticket para transferir'); return; } const dest = prompt('Fila destino (ex: Documentos)'); if(dest){ alert('Ticket ' + currentTicket.id + ' transferido para ' + dest); currentTicket = null; document.getElementById('status').textContent = 'Pronto'; } }

    // keyboard shortcuts
    document.addEventListener('keydown', e => {
      if(e.key === 'F2') callBtn.click();
      if(e.key === 'F3') finalizeBtn.click();
    });
  </script>
</body>
</html>
