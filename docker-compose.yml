version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestao_filas
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_CLIENT: pg
      DATABASE_URL: postgres://postgres:postgres@db:5432/gestao_filas
    depends_on:
      db:
        condition: service_healthy

  prototypes:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./prototypes:/usr/share/nginx/html:ro
      - ./prototypes/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
